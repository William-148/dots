# https://wiki.hyprland.org/Configuring/Variables/#animations
# animations {
#   enabled = true
#
#   # Bezier curves
#   bezier = md3_standard, 0.2, 0, 0, 1
#   bezier = md3_decel, 0.05, 0.7, 0.1, 1
#   bezier = md3_accel, 0.3, 0, 0.8, 0.15
#   bezier = overshot, 0.05, 0.9, 0.1, 1.1
#   bezier = crazyshot, 0.1, 1.5, 0.76, 0.92
#   bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
#   bezier = fluent_decel, 0.1, 1, 0, 1
#   bezier = easeInOutCirc, 0.85, 0, 0.15, 1
#   bezier = easeOutCirc, 0, 0.55, 0.45, 1
#   bezier = impulseout, 0.72,0.56,0.94,0.03
#
#   # Default animations,
#   # see https://wiki.hyprland.org/Configuring/Animations/ for more
#   animation = windows, 1, 3, overshot, popin 60%
#   animation = border, 1, 10, default
#   # bezier = linear, 0.0, 0.0, 1.0, 1.0
#   # animation = borderangle, 1, 80, linear, loop
#   animation = fade, 1, 5, default
#   # animation = workspaces, 1, 4.5, md3_decel, slidefade 15%
#   animation = workspaces, 1, 3.5, crazyshot, slide
#   animation = specialWorkspace, 1, 3, md3_decel, slidefadevert -40%
#   animation = layersIn, 1, 2, impulseout, default
#   animation = layersOut, 1, 2, impulseout, default
# }

animations {
    enabled = true
    # Curves
    bezier = expressiveFastSpatial, 0.42, 1.67, 0.21, 0.90
    bezier = expressiveSlowSpatial, 0.39, 1.29, 0.35, 0.98
    bezier = expressiveDefaultSpatial, 0.38, 1.21, 0.22, 1.00
    bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1
    bezier = emphasizedAccel, 0.3, 0, 0.8, 0.15
    bezier = standardDecel, 0, 0, 0, 1
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.52, 0.03, 0.72, 0.08
    bezier = stall, 1, -0.1, 0.7, 0.85
    # Configs
    # windows
    animation = windowsIn, 1, 3, emphasizedDecel, popin 80%
    animation = fadeIn, 1, 3, emphasizedDecel
    animation = windowsOut, 1, 2, emphasizedDecel, popin 90%
    animation = fadeOut, 1, 2, emphasizedDecel
    animation = windowsMove, 1, 3, emphasizedDecel, slide
    animation = border, 1, 10, emphasizedDecel
    # layers
    animation = layersIn, 1, 2.7, emphasizedDecel, default
    animation = layersOut, 1, 2.4, menu_accel, default
    # fade
    animation = fadeLayersIn, 1, 6, standardDecel
    animation = fadeLayersOut, 1, 5, stall
    # workspaces
    animation = workspaces, 1, 7, menu_decel, slide
    ## specialWorkspace
    animation = specialWorkspaceIn, 1, 2.8, emphasizedDecel, slidevert -70%
    animation = specialWorkspaceOut, 1, 1.2, emphasizedAccel, slidevert -80%

}

