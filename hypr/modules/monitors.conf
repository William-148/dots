# monitor=eDP-1, 1920x1080@60, 0x0, 1.2
monitorv2 {
  output = eDP-1
  mode = 1920x1080@60
  position = 0x0
  scale = 1.2
}

# monitorv2 {
#   output = HDMI-A-1
#   mode = 1920x1080@60
#   position = -1600x0
#   scale = 1.2
#   transform = 2
