# For more information visit https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/

$scrPath      = ~/.config/hypr/hyprlock/
$imgPath      = ~/.config/hypr/hyprlock/assets/

$USER         = willi # Your Alias
$host         = uname -n #Your Alias
$wifi-mode    = true # Change the WiFi output. true = show SSID, false = Connected.
$bt-mode      = false # Change the Bluetooth output. true = show Device name, false = Connected.

# Default geolocation provider is IP-API.COM, hardcode it if the location does not match the current location.
# Hardcode your location (If hardcode does not recognize your City, change it to IP Geolocation provider in weatherinfo.sh)
$CITY         = Patzicía
$COUNTRY      = Guatemala

# WALLPAPER
# Just comment and uncomment to select
# $wallpaper    = screenshot
$wallpaper    = ~/Wallpapers/wallhaven-q22jyd_1920x1080.png
# $wallpaper    = ~/Wallpapers/wallhaven-d68vyl_1920x1080.png

$blur         = 0

# ADJUST HERE
$rounding     = 8
$shape-rd     = -1
# $font-text    = GeistMono Nerd Font Bold
# $font-text0   = GeistMono Nerd Font
$font-text    = Hurmit Nerd Font Bold
$font-text0   = Hurmit Nerd Font
$font-default = Rajdhani Bold

# $font-display = PP Neue Machina Ultra-Bold
$font-display = Rajdhani Bold
# $font-symbol  = JetBrainsMono Nerd Font Mono
$font-symbol  = Hurmit Nerd Font Mono

# Input Var
$weight       = 2
$inner-color  = rgba(14, 14, 23, 0.88) # #0e0e17
$border-color = rgba(255, 59, 69, 1)  # #FF3B45

# Colors
$clock-color  = rgba(255, 255, 255, 1)
$fg0          = rgba(255, 255, 255, 1)
$fg1          = rgba(0, 0, 0, 1)
$shape-col0   = rgba(255, 255, 255, 1)
$shape-col1   = rgba(0, 0, 0, 0.25)
$shape-col2   = rgba(255, 255, 255, 0.25)
$shadow-pass  = 2
$shadow-size  = 3
$shadow-color = rgb(0,0,0)
$shadow-boost = 1.2
$text-shadow-pass   = 1
$text-shadow-boost  = 0.5

$ui-cyan = rgb(94, 246, 255)
$ui-cyan-shadow = rgb(15, 100, 110)
$ui-red = rgb(255, 59, 69)
$ui-red-shadow = rgb(120, 20, 25)
$ui-orange = rgb(251, 147, 45)
$ui-gold = rgb(240, 181, 55)
$ui-gold-shadow = rgb(120, 90, 25)


# GENERAL
general {
    no_fade_in          = false
    grace               = 1
    disable_loading_bar = false
    hide_cursor         = true
    ignore_empty_input  = true
    text_trim           = true
    fractional_scaling  = 1
}

#BACKGROUND
background {
    monitor     = 
    path        = $wallpaper
    blur_passes         = $blur
    blur_size           = 3
    contrast            = 0.8916
    brightness          = 0.7172
    vibrancy            = 0.1696
    vibrancy_darkness   = 0
}

# PROFILE ***************************************************************************
# User Info
label {
    monitor     =
    text        = <span color='##FF3B45'> </span><span text_transform='uppercase'>$USER</span>
    # text        = $USER
 
    color               = $ui-cyan
    font_size           = 18
    font_family         = Rajdhani SemiBold

    position            = -50, -28
    halign              = right
    valign              = top
}
label { # shadow
    monitor     =
    text        = <span text_transform='uppercase'>$USER</span>
 
    color               = $ui-cyan-shadow
    font_size           = 18
    font_family         = Rajdhani SemiBold

    position            = -49, -30
    halign              = right
    valign              = top
}

image {
    monitor     =
    path        =  $imgPath/profile_container.png
    size        = 230 # lesser side if not 1:1 ratio
    opacity     = 0.25

    rounding            = 0 # negative values mean circle
    border_size         = 0
    rotate              = 0 # degrees, counter-clockwise
    border_color        = $ui-red # #FF3B45

    position            = -40, -62
    halign              = right
    valign              = top
    zindex              = 2
}


# Profile Picture
image {
    monitor     =
    path        =  $imgPath/profile.jpg
    size        = 230 # lesser side if not 1:1 ratio

    rounding            = 0 # negative values mean circle
    border_size         = 0
    rotate              = 0 # degrees, counter-clockwise
 
    position            = -40, -80
    halign              = right
    valign              = top
    zindex              = 1
}

shape { # box shadow
    monitor     =
    size        = 230, 248
    opacity     = 0

    shadow_passes       = $shadow-pass
    shadow_size         = $shadow-size
    shadow_color        = $ui-red
    shadow_boost        = $shadow-boost

    rounding            = 0
    border_size         = 0

    position            = -40, -62
    halign              = right
    valign              = top
    zindex              = 1
}

# System Info
label {
    monitor     =
    text        = cmd[update:1000] echo -e "<span line_height='0.8' text_transform='uppercase'>󰁥 $($host)\n$(uname -r)</span>"
    text_align  = right

    color               = $ui-red
    font_size           = 11
    font_family         = Orbitron SemiBold

    position            = -50, -320
    halign              = right
    valign              = top
}

label {
    monitor     =
    text        = cmd[update:1000] echo -e "<span line_height='0.8' text_transform='uppercase'>󰁥 $($host)\n$(uname -r)</span>"
    text_align  = right

    color               = $ui-red-shadow
    font_size           = 11
    font_family         = Orbitron SemiBold

    position            = -49, -321
    halign              = right
    valign              = top
}

# INPUT FIELD *******************************************************************************
label {
    monitor     =
    text        = TERMINAL ACCESS
    color       = rgb(255, 59, 69)
    font_size           = 13
    font_family         = Orbitron Bold
    position            = -120, 10
    halign              = center
    valign              = center
    zindex              = 2
}

label { # shadow
    monitor     =
    text        = TERMINAL ACCESS
    color       = $ui-red-shadow

    font_size           = 13
    font_family         = Orbitron Bold
 
    position            = -119, 9
    halign              = center
    valign              = center
    zindex              = 1
}

input-field {
    monitor     =
    size        = 450, 55
    rounding    = 0

    outline_thickness   = 1
    outer_color         = $border-color
    dots_size           = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing        = 0.3 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center         = true
    # dots_text_format    = <span font='13'> </span>
    dots_text_format    = <span font='13'> </span>

    inner_color         = $inner-color
    font_color          = rgba(94, 246, 255, 1)
    fade_on_empty       = false

    font_family         = $font-default
    # placeholder_text    = <span font='19'>󰢏 </span>
    placeholder_text    = <span font='30' color='##FF3B45'> 󰛡 </span>
    # placeholder_text    = <span font='30'> 󱃲 </span>
    fail_text           = <span>ACCESS DENIED [ERROR 0xC7]</span>
    hide_input          = false

    position            = 0, -35
    halign              = center
    valign              = center
    zindex              = 10
}

# CLOCK - TIME *******************************************************************************
# TIME HR
label {
    monitor     =
    text        = cmd[update:1000] echo -e "$(date +"%H")" # 24-Hour Format
    # text        = cmd[update:1000] echo -e "$(date +"%H %M")" # 24-Hour Format
   #text        = cmd[update:1000] echo -e "$(date +"%I")" # 12-Hour Format
    color       = rgb(255, 59, 69)

    shadow_passes         = $shadow-pass
    shadow_size         = $shadow-size
    shadow_color        = rgba(150, 20, 25, 0.4)
    shadow_boost        = $shadow-boost


    font_size           = 120
    font_family         = $font-display 
    # font_family         = Rajdhani Bold
 
    position            = -585, 40
    halign              = center
    valign              = center
}

# TIME MM
label {
    monitor     =
    text        = cmd[update:1000] echo -e "$(date +"%M")"
    color       = rgb(255, 59, 69)
    
    shadow_passes         = $shadow-pass
    shadow_size         = $shadow-size
    shadow_color        = rgba(150, 20, 25, 0.4)
    shadow_boost        = $shadow-boost

    font_size           = 120
    font_family         = $font-display
    
    position            = -500, -80
    halign              = center
    valign              = center
}


