format = """
[рң¶үрңҙҹв–Ҳ](#fcf00a)\
$os\
$username\
[оӮј](bg:#0a242b fg:#fcf00a)\
$directory\
[оӮј](fg:#0a242b bg:#1c3a44)\
$git_branch\
$git_status\
[оӮј](fg:#1c3a44 bg:#212736)\
$nodejs\
$rust\
$golang\
$php\
[оӮј](fg:#212736 bg:#1d2230)\
$time\
[в–Ҳрҹ¬Ҙрҹ¬–рҹ¬–](fg:#1d2230)\
\n$character"""

# Replace the "вқҜ" symbol in the prompt with "вһң"
[character]
success_symbol = "[рңө”рң·ҷ](bold fg:#fcf00a)[вқҜ](bold bg:#fcf00a fg:#151b44)[рҹӯқрҹӯҳ](bold fg:#fcf00a)"
error_symbol = "[рңө”рң·ҷ](bold fg:red)[вң—](bold bg:red fg:#151b44)[рҹӯқрҹӯҳ](bold fg:red)"

[username]
show_always = true
style_user = "bg:#fcf00a fg:#151b44"
style_root = "bold bg:#fcf00a fg:#b8005a"
format = '[$user ]($style)'
disabled = false
aliases = { "root" = "root пҒӯ" }

[os]
style = "bg:#fcf00a fg:#151b44"
disabled = false

[os.symbols]
Arch = "пҢғ "

[directory]
style = "bg:#0a242b fg:#F63369"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "уұ§¶ "
"Projects" = "оә§ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
"Documentos" = "уұ§¶ "
"Descargas" = "пҖҷ "
"MГәsica" = "пҖҒ "
"ImГЎgenes" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#1c3a44"
format = '[[ $symbol $branch ](fg:#2f96a4 bg:#1c3a44)]($style)'

[git_status]
style = "bg:#1c3a44"
format = '[[($all_status$ahead_behind )](fg:#2f96a4 bg:#1c3a44)]($style)'

[nodejs]
symbol = "оө„ "
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = "оҳ§"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[ пҗә  $time ](fg:#F14D41 bg:#1d2230)]($style)'
