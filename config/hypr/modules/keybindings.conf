# G E N E R A L   B I N D S -------------------------------
# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
# bindl = $mainMod SHIFT, E, exit, # Kill current session
bindl = $mainMod SHIFT, E, exec, uwsm stop # Kill current session (uwsm)
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, Q, killactive,
bind = Alt, F4, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, F, exec, $browser
bind = $mainMod, M, fullscreen,
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, ESCAPE, exec, wlogout -b 5

# W A L L P A P E R ---------------------------------------
bind = $mainMod, W, exec, waypaper
bind = $mainMod SHIFT, W, exec, waypaper --random

# W I N D O W S -------------------------------------------
# To switch between windows in a floating workspace:
bind = $mainMod, Tab, cyclenext         # Change focus to another window
bind = $mainMod, Tab, bringactivetotop  # Bring it to the top

# Window split ratio (change windows area size)
bind = $mainMod, Semicolon, layoutmsg, splitratio -0.1 # [;]
bind = $mainMod, Apostrophe, layoutmsg, splitratio +0.1 # [']

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, Page_Up, movefocus, l
bind = $mainMod, Page_Down, movefocus, r

# Move window
bind = $mainMod Shift, Left, movewindow, l
bind = $mainMod Shift, Right, movewindow, r
bind = $mainMod Shift, Up, movewindow, u
bind = $mainMod Shift, Down, movewindow, d
bind = $mainMod Shift, Page_Up, movewindow, l
bind = $mainMod Shift, Page_Down, movewindow, r

# Move floating windows
binde = $mainMod ALT, H, moveactive, -120 0
binde = $mainMod ALT, L, moveactive, 120 0
binde = $mainMod ALT, K, moveactive, 0 -120
binde = $mainMod ALT, J, moveactive, 0 120


# W O R K S P A C E S -------------------------------------
# Switch with: maindMod + [0 - 9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active windows to workspace with: maindMod + SHIFT + [0 - 9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move active windows to workspace, in silent mode; with: maindMod + CONTROL + [0 - 9]
bind = $mainMod CONTROL, 1, movetoworkspacesilent, 1
bind = $mainMod CONTROL, 2, movetoworkspacesilent, 2
bind = $mainMod CONTROL, 3, movetoworkspacesilent, 3
bind = $mainMod CONTROL, 4, movetoworkspacesilent, 4
bind = $mainMod CONTROL, 5, movetoworkspacesilent, 5
bind = $mainMod CONTROL, 6, movetoworkspacesilent, 6
bind = $mainMod CONTROL, 7, movetoworkspacesilent, 7
bind = $mainMod CONTROL, 8, movetoworkspacesilent, 8
bind = $mainMod CONTROL, 9, movetoworkspacesilent, 9
bind = $mainMod CONTROL, 0, movetoworkspacesilent, 10

# Special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic
bind = $mainMod CONTROL, S, movetoworkspacesilent, special:magic


# M O U S E   A C T I O N S -------------------------------
bindm = $mainMod, mouse:273, resizewindow
bindm = $mainMod, mouse:272, movewindow
# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1


# S P E C I A L   K E Y S ---------------------------------
# Media binds
bindel=, XF86AudioRaiseVolume, exec, ~/.config/scripts/volume.sh 2%+
bindel=, XF86AudioLowerVolume, exec, ~/.config/scripts/volume.sh 2%-

bindl=, XF86AudioMute, exec, ~/.config/scripts/audio-mute.sh
bindel=, XF86AudioPlay, exec, ~/.config/scripts/play-pause.sh

# Brightness binds
bindel=, XF86MonBrightnessUp, exec, ~/.config/scripts/brightness.sh +1%
bindel=, XF86MonBrightnessDown, exec, ~/.config/scripts/brightness.sh 1%-

# Screenshot binds
bind =, Print, exec, hyprshot -m output -m active --clipboard-only # Screenshot a monitor
bind = SHIFT, PRINT, exec, hyprshot -m window # Screenshot a window
bind = CONTROL, PRINT, exec, hyprshot -m region # Screenshot a region
bind = $mainMod, PRINT, exec, hyprpicker -a # Open color picker

